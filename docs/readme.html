<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Guide — ApplyForge Docs</title>
  <meta name="description" content="Complete ApplyForge project guide: architecture, setup, configuration, and automation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./styles.css">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
  >
  <style>
    .readme-body {
      max-width: 820px;
      margin: 0 auto;
    }

    .readme-body h1,
    .readme-body h2,
    .readme-body h3,
    .readme-body h4 {
      margin-top: 2em;
      margin-bottom: 0.5em;
      line-height: 1.2;
      max-width: 100%;
    }

    .readme-body h1 { font-size: clamp(2rem, 4vw, 3.2rem); margin-top: 0.4em; }
    .readme-body h2 { font-size: clamp(1.4rem, 2.5vw, 2rem); }
    .readme-body h3 { font-size: 1.2rem; }

    .readme-body p,
    .readme-body li {
      line-height: 1.75;
      color: var(--muted);
    }

    .readme-body a { color: var(--accent); text-decoration: underline; }

    .readme-body hr {
      border: none;
      border-top: 1px solid var(--line);
      margin: 2.4em 0;
    }

    .readme-body ul,
    .readme-body ol {
      padding-left: 1.5em;
    }

    .readme-body li + li { margin-top: 0.35em; }

    .readme-body blockquote {
      margin: 0;
      padding: 12px 18px;
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
    }

    .readme-body blockquote p { margin: 0; color: var(--accent-strong); }

    .readme-body p code,
    .readme-body li code {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.88em;
      padding: 2px 6px;
      border-radius: 5px;
      background: rgba(8, 76, 97, 0.08);
      color: var(--accent-strong);
    }

    .readme-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      margin: 1.2em 0;
    }

    .readme-body th,
    .readme-body td {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
    }

    .readme-body th {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--bg-strong);
    }

    .readme-body img {
      max-width: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      display: block;
      margin: 1.2em auto;
    }

    .readme-code-block {
      position: relative;
      margin: 1.2em 0;
    }

    .readme-code-block pre {
      margin: 0;
      border-radius: var(--radius-md);
      overflow-x: auto;
    }

    .readme-code-block pre code {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.88rem;
      line-height: 1.65;
      padding-right: 64px !important;
    }

    .readme-load-error {
      color: var(--warm);
      padding: 24px;
      background: rgba(196, 99, 47, 0.06);
      border-radius: var(--radius-md);
      border: 1px solid rgba(196, 99, 47, 0.2);
    }

    .readme-load-error a { color: var(--warm); }
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <nav class="topbar">
        <a class="brand" href="index.html">ApplyForge Docs</a>
        <div class="topbar-links">
          <a href="index.html#tutorials">Tutorials</a>
          <a href="index.html#reference">Reference</a>
          <a href="index.html#workflow">Workflow</a>
          <a href="readme.html">Full Guide</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="section">
        <div class="readme-body" id="readme-content">
          <p style="color: var(--muted);">Loading README…</p>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    marked.use({
      renderer: {
        // marked v9 passes { tokens, depth } — text must be rendered via parseInline
        heading({ tokens, depth }) {
          const text = this.parser.parseInline(tokens);
          const plain = text.replace(/<[^>]*>/g, "");
          const id = plain
            .toLowerCase()
            .replace(/[^\w\s-]/g, "")
            .trim()
            .replace(/\s+/g, "-");
          return `<h${depth} id="${id}">${text}</h${depth}>\n`;
        }
      }
    });

    async function loadReadme() {
      const el = document.getElementById("readme-content");
      try {
        let res = await fetch("./README.md");
        if (!res.ok) res = await fetch("../README.md");
        if (!res.ok) throw new Error(`HTTP ${res.status} — README.md not found`);
        const md = await res.text();

        el.innerHTML = marked.parse(md);

        el.querySelectorAll("img").forEach((img) => {
          img.src = img.getAttribute("src").replace(/^docs\//, "./");
        });

        el.querySelectorAll("pre code").forEach((block) => {
          hljs.highlightElement(block);

          const pre = block.parentElement;
          const wrapper = document.createElement("div");
          wrapper.className = "readme-code-block";
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);

          const btn = document.createElement("button");
          btn.className = "copy-btn";
          btn.textContent = "Copy";
          btn.addEventListener("click", () => {
            navigator.clipboard.writeText(block.textContent).then(() => {
              btn.textContent = "Copied!";
              btn.classList.add("copied");
              setTimeout(() => {
                btn.textContent = "Copy";
                btn.classList.remove("copied");
              }, 2000);
            });
          });
          wrapper.appendChild(btn);
        });
      } catch (err) {
        el.innerHTML = `<p class="readme-load-error">Could not load guide (${err.message}). <a href="https://github.com/FahimFBA/applyforge/blob/main/README.md">View on GitHub</a></p>`;
      }
    }

    loadReadme();
  </script>
</body>
</html>
